name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(jq -r .version custom_components/ha_gitops/manifest.json)
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match manifest version $MANIFEST"
            exit 1
          fi

      - name: Package integration
        run: |
          cd custom_components/ha_gitops
          zip -r ../../ha_gitops.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ha_gitops.zip
